<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Reader Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f5f5f5;
            color: #333;
        }

        .dashboard {
            display: flex;
            height: 100vh;
        }

        .sidebar {
            width: 300px;
            background-color: #2c3e50;
            color: white;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .sidebar h2 {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #34495e;
        }

        .search-container {
            padding: 15px;
        }

        #searchInput {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            outline: none;
        }

        #bookList {
            flex: 1;
        }

        .book-title {
            padding: 15px;
            background-color: #34495e;
            cursor: pointer;
            user-select: none;
            border-bottom: 1px solid #2c3e50;
            font-weight: bold;
        }

        .book-title:hover {
            background-color: #3b536b;
        }

        .chapter-list {
            display: none; 
            background-color: #2c3e50;
            padding: 10px 15px;
        }

        .chapter-btn {
            display: inline-block;
            padding: 8px 12px;
            margin: 5px;
            background-color: #ecf0f1;
            color: #2c3e50;
            text-decoration: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9em;
        }

        .chapter-btn:hover {
            background-color: #bdc3c7;
        }

        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            background-color: #fff;
            overflow-y: auto;
        }

        header {
            padding: 30px;
            border-bottom: 1px solid #eee;
            background-color: #fafafa;
        }

        #readerArea {
            padding: 30px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            line-height: 1.8;
            font-size: 1.1em;
        }

        .verse-block {
            margin-bottom: 15px;
            display: flex;
        }

        .verse-num {
            font-weight: bold;
            color: #7f8c8d;
            margin-right: 15px;
            min-width: 25px;
            user-select: none;
        }

        .verse-text {
            flex: 1;
        }

        .search-result {
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #eee;
        }

        .search-ref {
            font-weight: bold;
            color: #2980b9;
            cursor: pointer;
            margin-bottom: 5px;
            display: inline-block;
        }

        .search-ref:hover {
            text-decoration: underline;
        }

        mark {
            background-color: #ffeaa7;
            padding: 2px;
            border-radius: 3px;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <h2>Bible Reader</h2>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search scripture (min. 3 letters)...">
            </div>
            <nav id="bookList">
                <!-- Books and chapters will be injected here via JS -->
            </nav>
        </aside>

        <!-- Main Reading Area -->
        <main class="content">
            <header>
                <h1 id="chapterTitle">Welcome</h1>
            </header>
            <div id="readerArea">
                <p>Select a chapter from the left to start reading, or use the search bar to find specific verses.</p>
            </div>
        </main>
    </div>

    <!-- 1. Load the data template first -->
    <script src="bible-data.js"></script>

    <!-- 2. Application Logic -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const bookListEl = document.getElementById("bookList");
            const readerAreaEl = document.getElementById("readerArea");
            const chapterTitleEl = document.getElementById("chapterTitle");
            const searchInput = document.getElementById("searchInput");

            // Build the sidebar navigation
            function renderNavigation() {
                bookListEl.innerHTML = "";
                
                if (typeof bibleData === 'undefined') {
                    readerAreaEl.innerHTML = "<p style='color:red;'>Error: bible-data.js not found. Make sure the file exists in the same folder!</p>";
                    return;
                }

                bibleData.forEach((bookObj) => {
                    const bookHeader = document.createElement("div");
                    bookHeader.className = "book-title";
                    bookHeader.innerText = bookObj.book;
                    
                    const chapterContainer = document.createElement("div");
                    chapterContainer.className = "chapter-list";
                    
                    bookObj.chapters.forEach((chapObj) => {
                        const chapBtn = document.createElement("span");
                        chapBtn.className = "chapter-btn";
                        chapBtn.innerText = `Ch. ${chapObj.chapter}`;
                        
                        chapBtn.addEventListener("click", () => {
                            displayChapter(bookObj.book, chapObj.chapter, chapObj.verses);
                        });
                        
                        chapterContainer.appendChild(chapBtn);
                    });
                    
                    bookHeader.addEventListener("click", () => {
                        const isVisible = chapterContainer.style.display === "block";
                        chapterContainer.style.display = isVisible ? "none" : "block";
                    });
                    
                    bookListEl.appendChild(bookHeader);
                    bookListEl.appendChild(chapterContainer);
                });
            }

            // Display a chapter
            function displayChapter(bookName, chapterNum, verses) {
                chapterTitleEl.innerText = `${bookName} Chapter ${chapterNum}`;
                readerAreaEl.innerHTML = "";
                
                verses.forEach((verseText, index) => {
                    const verseBlock = document.createElement("div");
                    verseBlock.className = "verse-block";
                    
                    const verseNum = document.createElement("span");
                    verseNum.className = "verse-num";
                    verseNum.innerText = index + 1;
                    
                    const verseTextEl = document.createElement("span");
                    verseTextEl.className = "verse-text";
                    verseTextEl.innerText = verseText;
                    
                    verseBlock.appendChild(verseNum);
                    verseBlock.appendChild(verseTextEl);
                    readerAreaEl.appendChild(verseBlock);
                });
            }

            // Search Functionality
            searchInput.addEventListener("input", (e) => {
                const query = e.target.value.toLowerCase().trim();
                
                if (query.length < 3) {
                    if (query.length === 0) {
                        chapterTitleEl.innerText = "Welcome";
                        readerAreaEl.innerHTML = "<p>Select a chapter from the left to start reading.</p>";
                    }
                    return;
                }
                
                const results = [];
                
                bibleData.forEach(bookObj => {
                    bookObj.chapters.forEach(chapObj => {
                        chapObj.verses.forEach((verseText, vIndex) => {
                            if (verseText.toLowerCase().includes(query)) {
                                results.push({
                                    reference: `${bookObj.book} ${chapObj.chapter}:${vIndex + 1}`,
                                    text: verseText,
                                    book: bookObj.book,
                                    chapter: chapObj.chapter,
                                    verses: chapObj.verses
                                });
                            }
                        });
                    });
                });
                
                displaySearchResults(query, results);
            });

            // Render Search Results
            function displaySearchResults(query, results) {
                chapterTitleEl.innerText = `Search Results for "${query}"`;
                readerAreaEl.innerHTML = "";
                
                if (results.length === 0) {
                    readerAreaEl.innerHTML = "<p>No matches found.</p>";
                    return;
                }
                
                const resultCount = document.createElement("p");
                resultCount.innerText = `Found ${results.length} results.`;
                resultCount.style.marginBottom = "20px";
                readerAreaEl.appendChild(resultCount);
                
                results.forEach(res => {
                    const resultDiv = document.createElement("div");
                    resultDiv.className = "search-result";
                    
                    const refEl = document.createElement("div");
                    refEl.className = "search-ref";
                    refEl.innerText = res.reference;
                    
                    refEl.addEventListener("click", () => {
                        searchInput.value = ""; 
                        displayChapter(res.book, res.chapter, res.verses);
                    });
                    
                    const textEl = document.createElement("div");
                    const regex = new RegExp(`(${query})`, 'gi');
                    textEl.innerHTML = res.text.replace(regex, '<mark>$1</mark>');
                    
                    resultDiv.appendChild(refEl);
                    resultDiv.appendChild(textEl);
                    readerAreaEl.appendChild(resultDiv);
                });
            }

            renderNavigation();
        });
    </script>
<script src="KJVGENESISCHP1-3.js"></script> 
</body>
</html>
