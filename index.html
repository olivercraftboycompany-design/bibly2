<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bible Reader Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <h2>Bible Reader</h2>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Search scripture (min. 3 letters)...">
            </div>
            <nav id="bookList">
                <!-- Books and chapters will be injected here via JS -->
            </nav>
        </aside>

        <!-- Main Reading Area -->
        <main class="content">
            <header>
                <h1 id="chapterTitle">Welcome</h1>
            </header>
            <div id="readerArea">
                <p>Select a chapter from the left to start reading, or use the search bar to find specific verses.</p>
            </div>
        </main>
    </div>

    <!-- Scripts: The data file MUST load before the app logic -->
    <script src="bible-data.js"></script>
    <script src="app.js"></script>
</body>
</html>
